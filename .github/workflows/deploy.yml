name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r tests/requirements-test.txt

      - name: Run unit tests
        run: pytest -m "not integration" -v --tb=short

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test  # deploy only runs if test job passes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build and push image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT }}/telegram-bot ./backend
          docker push gcr.io/${{ secrets.GCP_PROJECT }}/telegram-bot

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy telegram-bot \
            --image gcr.io/${{ secrets.GCP_PROJECT }}/telegram-bot \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-secrets "BOT_TOKEN=BOT_TOKEN:latest,SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_KEY=SUPABASE_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,ADMIN_API_KEY=ADMIN_API_KEY:latest,WEBHOOK_SECRET=WEBHOOK_SECRET:latest" \
            --set-env-vars "GCS_BUCKET=timelycal-pdfs,GCP_PROJECT=my-telegram-bot-001,GCP_REGION=us-central1" \
            --min-instances 0 \
            --max-instances 1 \
            --memory 512Mi \
            --timeout 300 \
            --project ${{ secrets.GCP_PROJECT }}

      - name: Re-register Telegram webhook
        run: |
          curl -sf -H "x-api-key: ${{ secrets.ADMIN_API_KEY }}" ${{ secrets.SERVICE_URL }}/webhook/set-webhook
